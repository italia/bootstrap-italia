<header class="navbar-main navbar navbar-dark bd-navbar px-3 {% if page.layout == "docs" %}bd-navbar--slim{% endif %}">
  <div class="container{% if page.layout == "docs" %}-fluid{% endif %}">

    <div class="d-flex flex-row gap-2 justify-content-between w-100">

      {% if page.layout == "docs" %}
        <button class="d-md-none btn btn-sm" type="button" data-bs-toggle="collapse"
          data-bs-target="#bd-docs-nav" aria-controls="bd-docs-nav" aria-expanded="false"
          aria-label="Toggle docs navigation">
          <svg class="icon icon-sm icon-inverse">
            <use href="{{ site.baseurl }}/dist/svg/sprites.svg#it-burger"></use>
          </svg><span class="visually-hidden">Menu</span>
        </button>
      {% endif %}

      <a class="navbar-brand text-decoration-none w-50" href="{{ site.baseurl }}/" aria-label="Bootstrap Italia Homepage"
        title="Bootstrap Italia Homepage">
        <div class="d-flex flex-row">
          <span class="d-block bd-logo-mark">
            {%- include icons/it-logo.svg -%}
          </span>
          <div class="d-flex flex-column ps-3 ps-sm-4">
            <h1 class="bd-logo-title">Bootstrap Italia</h1>
            <h2 class="bd-logo-subtitle">Interfacce Web Accessibili per la PA</h2>
          </div>
        </div>
      </a>

      <div class="d-flex flex-row gap-2 justify-content-end align-items-center w-50">
        <ul class="navbar-nav flex-row ms-md-auto d-none d-md-flex">
          <li class="nav-item pe-2">
            <a title="Scarica Bootstrap Italia" data-toggle="tooltip" class="nav-link d-flex align-items-center"
              href="https://github.com/italia/bootstrap-italia/releases/download/v{{ site.current_version }}/bootstrap-italia.zip"
              aria-label="Download">
              <small class="pe-2 m-0">v{{ site.current_version }}</small>
              <svg class="icon icon-sm icon-inverse">
                <use href="{{ site.baseurl }}/dist/svg/sprites.svg#it-download"
                  xlink:href="{{ site.baseurl }}/dist/svg/sprites.svg#it-download"></use>
              </svg><span class="visually-hidden">Download</span>
            </a>
          </li>
          <li class="nav-item pe-2">
            <a title="Repository GitHub di Bootstrap Italia" data-toggle="tooltip"
              class="nav-link d-flex align-items-center" href="{{ site.repo }}" target="_blank" rel="noopener noreferrer"
              aria-label="GitHub">
              <svg class="icon icon-sm icon-inverse">
                <use href="{{ site.baseurl }}/dist/svg/sprites.svg#it-github"
                  xlink:href="{{ site.baseurl }}/dist/svg/sprites.svg#it-github"></use>
              </svg><span class="visually-hidden">GitHub</span>
            </a>
          </li>
        </ul>

        <div onclick="document.querySelector('#search-input > button').click()" class="search-in-docs">
          <a aria-current="page" href="#" class="search-link rounded-icon" aria-label="Cerca nel sito"
            data-focus-mouse="false">
            <svg role="img" class="icon icon-sm icon-primary">
              <use href="{{ site.baseurl }}/dist/svg/sprites.svg#it-search"></use>
            </svg>
          </a>
        </div>
        <div id="search-input"></div>
      </div>

    </div>
  </div>
</header>
