description:
  it-IT:
    shortDescription: Framework front-end basato su Bootstrap per sviluppare
      interfacce accessibili e coerenti per i siti e i servizi digitali della
      PA.
    longDescription: Bootstrap Italia è un framework front-end, risorsa ufficiale
      del Design system Italia, che supporta lo sviluppo di interfacce per siti
      e servizi digitali della Pubblica Amministrazione. Basato su Bootstrap, ne
      estende componenti, griglia e utility per implementare soluzioni conformi
      alle Linee guida di design per i siti internet e i servizi digitali della
      Pubblica Amministrazione. Mette a disposizione componenti e pattern pronti
      all'uso, inclusi quelli dello UI Kit Italia, rendendoli disponibili come
      codice riutilizzabile e facilitando la realizzazione di interfacce
      accessibili, responsive e coerenti.
    documentation: https://italia.github.io/bootstrap-italia/
    features:
      - Componenti e pattern per interfacce web pronti all'uso
      - Realizzazione di interfacce responsive e accessibili
      - Estensione di Bootstrap
      - Implementa lo UI Kit Italia
      - Integrazione tramite CSS e JavaScript
      - Conformità alle Linee guida di design per i siti internet e servizi
        digitali della PA
